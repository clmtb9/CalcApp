name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment1.outputs.page_url || steps.deployment2.outputs.page_url || steps.deployment3.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (attempt 1)
        id: deployment1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Deploy to GitHub Pages (attempt 2)
        id: deployment2
        if: steps.deployment1.outcome != 'success'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Deploy to GitHub Pages (attempt 3)
        id: deployment3
        if: steps.deployment1.outcome != 'success' && steps.deployment2.outcome != 'success'
        uses: actions/deploy-pages@v4

      - name: Ensure deployment succeeded
        if: always()
        run: |
          if [ "${{ steps.deployment1.outcome }}" = "success" ] || [ "${{ steps.deployment2.outcome }}" = "success" ] || [ "${{ steps.deployment3.outcome }}" = "success" ]; then
            exit 0
          fi
          exit 1
